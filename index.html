<!doctype html>
<html>
  <head>
    <title>Mr. Driller</title>

    <meta
      id="viewport"
      name="viewport"
      content="width=device-width, minimum-scale=1.0, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        overflow-x: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        min-height: 100vh;
        width: 100vw;
      }
      button, input, select, textarea {
        font-family: inherit;
      }
      .toggle-root {
        display: flex;
        position: relative;
        width: 42px;
        height: 24px;
        border: none;
        background: transparent;
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
      }
      .toggle-root::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 9998px;
        background-color: rgba(0, 0, 0, 0.1);
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.16);
        transition: background-color 0.14s ease-in-out, box-shadow 0.14s ease-in-out;
      }
      .toggle-root[aria-checked="true"]::before {
        background-color: #3458D3;
        box-shadow: none;
      }
      .toggle-thumb {
        position: absolute;
        top: 1px;
        left: 1px;
        width: 22px;
        height: 22px;
        border-radius: 9998px;
        background-color: white;
        box-shadow: 0 0 1px 1px rgba(0,0,0,0.1), 0 1px 1px 0 rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.05);
        transition: transform 0.14s cubic-bezier(0.45, 0.05, 0.55, 0.95);
      }
      .toggle-root[aria-checked="true"] .toggle-thumb {
        transform: translateX(18px);
      }
      select {
        height: 32px;
        background-color: rgba(255, 255, 255, 0.85);
        border: none;
        border-radius: 6px;
        box-shadow: rgba(0, 6, 46, 0.196) 0px 0px 0px 1px inset;
        padding: 0 28px 0 10px;
        font-size: 14px;
        box-sizing: border-box;
        color: rgb(28, 32, 36);
        appearance: none;
        -webkit-appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 4L6 8L10 4' stroke='%23888' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 8px center;
        cursor: pointer;
      }
      input[type=number] {
        height: 32px;
        background-color: rgba(255, 255, 255, 0.85);
        border: none;
        border-radius: 4px;
        box-shadow: rgba(0, 6, 46, 0.196) 0px 0px 0px 1px inset;
        padding: 0 8px;
        font-size: 14px;
        box-sizing: border-box;
        color: rgb(28, 32, 36);
      }
    </style>
  </head>

  <body>
    <noscript>Sorry! This is JavaScript all the way down.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
